# config/workflows/edd.yml
tier: EDD
description: 'PAN + Aadhaar + 2 address proofs + income proof, full AML + video KYC + mandatory compliance review for PEPs, high-risk jurisdictions, loans > INR 50L'
targetCompletionMinutes: 2880 # 48 hours
approvalAuthority: MANDATORY_COMPLIANCE_REVIEW

requiredDocuments:
  - documentType: PAN
    mandatory: true
  - documentType: AADHAAR
    mandatory: true
  - documentType: ADDRESS_PROOF
    mandatory: true
  - documentType: INCOME_PROOF
    mandatory: true

steps:
  - stepName: ckyc-search
    vendorType: CKYC
    order: 1
    parallelGroup: null
    guardExpression: null
    timeoutSeconds: 30
    retryPolicy:
      maxRetries: 2
      initialDelayMs: 2000
      backoffMultiplier: 2
      maxDelayMs: 10000

  - stepName: digilocker-fetch
    vendorType: DIGILOCKER
    order: 2
    parallelGroup: docs
    guardExpression: '!ckycRecordFound'
    timeoutSeconds: 120
    retryPolicy:
      maxRetries: 3
      initialDelayMs: 1000
      backoffMultiplier: 2
      maxDelayMs: 8000

  - stepName: video-kyc-session
    vendorType: VIDEO_KYC
    order: 3
    parallelGroup: null
    guardExpression: null
    timeoutSeconds: 259200 # 72h per Section A3.4's VENDOR_CALLBACK_AWAITED timer
    isAsync: true
    retryPolicy:
      maxRetries: 2
      initialDelayMs: 1000
      backoffMultiplier: 2
      maxDelayMs: 5000

  - stepName: full-aml-screen-adverse-media
    vendorType: AML_SCREENING
    order: 4
    parallelGroup: null
    guardExpression: null
    timeoutSeconds: 3
    retryPolicy:
      maxRetries: 2
      initialDelayMs: 1000
      backoffMultiplier: 2
      maxDelayMs: 5000

  - stepName: ongoing-monitoring-register
    vendorType: AML_SCREENING
    order: 5
    parallelGroup: null
    guardExpression: null
    timeoutSeconds: 5
    retryPolicy:
      maxRetries: 1
      initialDelayMs: 1000
      backoffMultiplier: 2
      maxDelayMs: 2000

  - stepName: compliance-officer-review
    vendorType: null # human-in-the-loop step, no vendor call — see WorkflowEngine's handling of null vendorType
    order: 6
    parallelGroup: null
    guardExpression: null
    timeoutSeconds: null # no automatic timeout; deadline is tracked separately via TimerService's 30-day EDD SLA
    isManualStep: true

  - stepName: ckyc-upload
    vendorType: CKYC
    order: 7
    parallelGroup: null
    guardExpression: 'complianceApproved'
    timeoutSeconds: 30
    retryPolicy:
      maxRetries: 3
      initialDelayMs: 5000
      backoffMultiplier: 2
      maxDelayMs: 30000

ckycUpload:
  timing: IMMEDIATE_POST_APPROVAL
  deadlineDays: 0

reVerification:
  frequency: QUARTERLY_AND_TRIGGER_BASED

documentRetentionYears: 10
ongoingMonitoring: FULL
