version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kyc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kyc_admin
      POSTGRES_PASSWORD: kyc_dev_password
      POSTGRES_DB: kyc_orchestration
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kyc_admin -d kyc_orchestration']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kyc-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
